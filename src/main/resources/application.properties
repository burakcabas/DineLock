spring.application.name=DineLock

# Sunucu Portu
server.port=8080

# MySQL Bağlantı Ayarları
spring.datasource.url=jdbc:mysql://localhost:3306/dinelock?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Hibernate & JPA Ayarları
# update: Proje çalıştığında tablolar yoksa oluşturur, varsa günceller.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
